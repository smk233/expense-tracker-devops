<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Server Error')}"></head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div style="font-size: 5rem;" class="text-danger mb-3">💥</div>
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h3 class="fw-bold mb-3">Server Error</h3>
        <p class="text-muted mb-4" th:text="${errorMessage ?: 'Something went wrong on our end. Please try again.'}">Error</p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/dashboard}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i> Go to Dashboard
            </a>
            <a href="javascript:location.reload()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i> Retry
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
