<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Access Denied')}"></head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div style="font-size: 5rem;" class="text-warning mb-3">⛔</div>
        <h1 class="display-1 fw-bold text-warning">403</h1>
        <h3 class="fw-bold mb-3">Access Denied</h3>
        <p class="text-muted mb-4" th:text="${errorMessage ?: 'You do not have permission to access this page.'}">Error message</p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/dashboard}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i> Go to Dashboard
            </a>
            <a th:href="@{/expenses}" class="btn btn-outline-secondary">
                <i class="bi bi-receipt me-1"></i> My Expenses
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
