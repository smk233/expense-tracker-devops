<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="sidebar" class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a th:href="@{/dashboard}" class="text-white text-decoration-none d-flex align-items-center">
            <i class="bi bi-wallet2 fs-4 me-2"></i>
            <span class="fw-bold fs-5">ExpenseTracker</span>
        </a>
    </div>

    <nav class="sidebar-nav">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a th:href="@{/dashboard}"
                   th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
                   class="nav-link">
                    <i class="bi bi-speedometer2 me-2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/expenses}"
                   th:classappend="${activePage == 'expenses'} ? 'active' : ''"
                   class="nav-link">
                    <i class="bi bi-receipt me-2"></i>
                    <span>My Expenses</span>
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/expenses/add}"
                   class="nav-link">
                    <i class="bi bi-plus-circle me-2"></i>
                    <span>Add Expense</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-divider"></div>

        <div class="sidebar-label">Account</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nav-link btn btn-link w-100 text-start">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        <span>Logout</span>
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="d-flex align-items-center">
            <div class="avatar me-2">
                <i class="bi bi-person-circle fs-4"></i>
            </div>
            <div>
                <div class="text-white small fw-semibold" th:text="${user?.fullName ?: 'User'}">User</div>
                <div class="text-white-50 x-small" th:text="${user?.email ?: ''}">email</div>
            </div>
        </div>
    </div>
</div>

</html>
