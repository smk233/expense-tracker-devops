<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark" id="mainNavbar">
    <div class="container-fluid">
        <!-- Toggle for mobile -->
        <button class="btn btn-link text-white me-2 d-lg-none" id="sidebarToggleMobile" type="button">
            <i class="bi bi-list fs-4"></i>
        </button>

        <!-- Brand -->
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-wallet2 me-1"></i>ExpenseTracker
        </a>

        <!-- Right side -->
        <div class="d-flex align-items-center ms-auto">
            <!-- Notifications placeholder -->
            <div class="me-3 d-none d-md-block">
                <span class="text-white-50 small">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(#temporals.createNow(), 'dd MMM yyyy')}">Today</span>
                </span>
            </div>

            <!-- User dropdown -->
            <div class="dropdown">
                <button class="btn btn-link text-white text-decoration-none dropdown-toggle d-flex align-items-center"
                        type="button" data-bs-toggle="dropdown">
                    <div class="avatar-sm me-2">
                        <i class="bi bi-person-circle fs-5"></i>
                    </div>
                    <span class="d-none d-md-inline" sec:authentication="name">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <div class="dropdown-item-text">
                            <div class="fw-semibold" sec:authentication="name">User</div>
                            <small class="text-muted" sec:authentication="principal.username">email</small>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

</html>
