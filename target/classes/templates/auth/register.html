<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Register')}"></head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-person-plus"></i>
            </div>
            <h2 class="fw-bold mt-3 mb-1">Create Account</h2>
            <p class="text-muted">Start tracking your expenses today</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" th:object="${registrationDto}" method="post" class="needs-validation" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="firstName" class="form-label fw-semibold">First Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="firstName" th:field="*{firstName}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                               placeholder="John" required>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}">Error</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="lastName" class="form-label fw-semibold">Last Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="lastName" th:field="*{lastName}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                               placeholder="Doe" required>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                         th:errors="*{lastName}">Error</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="you@example.com" required>
                </div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">Error</div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           placeholder="Min. 6 characters" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">Error</div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                           placeholder="Re-enter password" required>
                </div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}">Error</div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
            Already have an account?
            <a th:href="@{/login}" class="text-primary fw-semibold">Sign In</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments/footer :: scripts}"></div>
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>
</body>
</html>
