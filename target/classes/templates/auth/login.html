<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Login')}"></head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-wallet2"></i>
            </div>
            <h2 class="fw-bold mt-3 mb-1">Welcome Back</h2>
            <p class="text-muted">Sign in to your expense tracker</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" name="email"
                           class="form-control form-control-lg"
                           placeholder="you@example.com"
                           required autocomplete="email" autofocus>
                </div>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between">
                    <label for="password" class="form-label fw-semibold">Password</label>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control form-control-lg"
                           placeholder="Enter your password"
                           required autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me">
                    <label class="form-check-label" for="rememberMe">Remember me for 7 days</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted mb-0">
            Don't have an account?
            <a th:href="@{/register}" class="text-primary fw-semibold">Create Account</a>
        </p>

        <!-- Demo Credentials -->
        <div class="alert alert-info mt-4 mb-0 py-2">
            <small>
                <strong><i class="bi bi-info-circle me-1"></i>Demo Credentials:</strong><br>
                Admin: <code>admin@expense.com</code> / <code>admin123</code><br>
                User: <code>john@expense.com</code> / <code>user123</code>
            </small>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: scripts}"></div>
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>
</body>
</html>
