<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(${formTitle})}"></head>
<body>

<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content-area">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h4 class="page-title" th:text="${formTitle}">Expense Form</h4>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/expenses}">Expenses</a></li>
                            <li class="breadcrumb-item active" th:text="${formTitle}">Form</li>
                        </ol>
                    </nav>
                </div>
                <a th:href="@{/expenses}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Back to List
                </a>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h6 class="card-title mb-0 fw-semibold">
                                <i class="bi bi-receipt me-2 text-primary"></i>
                                <span th:text="${formTitle}">Expense Details</span>
                            </h6>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="${formAction}" th:object="${expenseDto}"
                                  method="post" class="needs-validation" novalidate>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <!-- Title -->
                                <div class="mb-4">
                                    <label for="title" class="form-label fw-semibold">
                                        Title <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-pencil-square"></i></span>
                                        <input type="text" id="title" th:field="*{title}"
                                               class="form-control form-control-lg"
                                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                               placeholder="e.g. Grocery Shopping, Electricity Bill..."
                                               required maxlength="200">
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                                         th:errors="*{title}">Error</div>
                                </div>

                                <!-- Description -->
                                <div class="mb-4">
                                    <label for="description" class="form-label fw-semibold">Description</label>
                                    <textarea id="description" th:field="*{description}"
                                              class="form-control"
                                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                              rows="3" placeholder="Optional description..."
                                              maxlength="1000"></textarea>
                                    <div class="form-text">Max 1000 characters</div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                                         th:errors="*{description}">Error</div>
                                </div>

                                <div class="row g-4 mb-4">
                                    <!-- Amount -->
                                    <div class="col-md-6">
                                        <label for="amount" class="form-label fw-semibold">
                                            Amount <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text fw-bold">₹</span>
                                            <input type="number" id="amount" th:field="*{amount}"
                                                   class="form-control form-control-lg"
                                                   th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"
                                                   placeholder="0.00" min="0.01" step="0.01" required>
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}"
                                             th:errors="*{amount}">Error</div>
                                    </div>

                                    <!-- Date -->
                                    <div class="col-md-6">
                                        <label for="expenseDate" class="form-label fw-semibold">
                                            Expense Date <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                            <input type="date" id="expenseDate" th:field="*{expenseDate}"
                                                   class="form-control form-control-lg"
                                                   th:classappend="${#fields.hasErrors('expenseDate')} ? 'is-invalid'"
                                                   required>
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('expenseDate')}"
                                             th:errors="*{expenseDate}">Error</div>
                                    </div>
                                </div>

                                <div class="row g-4 mb-4">
                                    <!-- Category -->
                                    <div class="col-md-6">
                                        <label for="category" class="form-label fw-semibold">
                                            Category <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                            <select id="category" th:field="*{category}"
                                                    class="form-select form-select-lg"
                                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                                                    required>
                                                <option value="">-- Select Category --</option>
                                                <option th:each="cat : ${categories}"
                                                        th:value="${cat}"
                                                        th:text="${cat.displayName}">Category</option>
                                            </select>
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}"
                                             th:errors="*{category}">Error</div>
                                    </div>

                                    <!-- Payment Method -->
                                    <div class="col-md-6">
                                        <label for="paymentMethod" class="form-label fw-semibold">
                                            Payment Method <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                                            <select id="paymentMethod" th:field="*{paymentMethod}"
                                                    class="form-select form-select-lg"
                                                    th:classappend="${#fields.hasErrors('paymentMethod')} ? 'is-invalid'"
                                                    required>
                                                <option value="">-- Select Method --</option>
                                                <option th:each="pm : ${paymentMethods}"
                                                        th:value="${pm}"
                                                        th:text="${pm.displayName}">Method</option>
                                            </select>
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('paymentMethod')}"
                                             th:errors="*{paymentMethod}">Error</div>
                                    </div>
                                </div>

                                <!-- Submit Buttons -->
                                <div class="d-flex gap-3 pt-2">
                                    <button type="submit" class="btn btn-primary btn-lg px-5 fw-semibold">
                                        <i class="bi bi-check-circle me-2"></i>
                                        <span th:text="${expenseDto.id != null} ? 'Update Expense' : 'Save Expense'">Save</span>
                                    </button>
                                    <a th:href="@{/expenses}" class="btn btn-outline-secondary btn-lg px-4">
                                        Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<div th:replace="~{fragments/footer :: scripts}"></div>
<script>
    // Set today as default date for new expenses
    window.addEventListener('DOMContentLoaded', function() {
        const dateField = document.getElementById('expenseDate');
        if (dateField && !dateField.value) {
            dateField.value = new Date().toISOString().split('T')[0];
        }
    });
</script>
</body>
</html>
