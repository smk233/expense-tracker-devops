<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('View Expense')}"></head>
<body>

<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content-area">
            <div class="page-header">
                <div>
                    <h4 class="page-title">Expense Details</h4>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/expenses}">Expenses</a></li>
                            <li class="breadcrumb-item active">View</li>
                        </ol>
                    </nav>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/expenses/edit/{id}(id=${expense.id})}" class="btn btn-primary">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </a>
                    <a th:href="@{/expenses}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> Back
                    </a>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h6 class="card-title mb-0 fw-semibold">
                                <i class="bi bi-receipt me-2 text-primary"></i>Expense Information
                            </h6>
                        </div>
                        <div class="card-body p-4">
                            <!-- Amount Hero -->
                            <div class="text-center mb-4 py-3 bg-danger bg-opacity-10 rounded-3">
                                <div class="text-muted small mb-1">Total Amount</div>
                                <div class="display-5 fw-bold text-danger">
                                    ₹<span th:text="${#numbers.formatDecimal(expense.amount, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                </div>
                            </div>

                            <dl class="row g-3">
                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-pencil-square me-1"></i>Title
                                </dt>
                                <dd class="col-sm-8 fw-semibold" th:text="${expense.title}">Title</dd>

                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-text-paragraph me-1"></i>Description
                                </dt>
                                <dd class="col-sm-8">
                                    <span th:if="${expense.description}" th:text="${expense.description}">Description</span>
                                    <span th:unless="${expense.description}" class="text-muted fst-italic">No description</span>
                                </dd>

                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-tag me-1"></i>Category
                                </dt>
                                <dd class="col-sm-8">
                                    <span class="badge category-badge fs-6"
                                          th:text="${expense.category.displayName}">Category</span>
                                </dd>

                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-credit-card me-1"></i>Payment Method
                                </dt>
                                <dd class="col-sm-8">
                                    <span class="badge bg-light text-dark border"
                                          th:text="${expense.paymentMethod.displayName}">Method</span>
                                </dd>

                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-calendar3 me-1"></i>Expense Date
                                </dt>
                                <dd class="col-sm-8 fw-semibold"
                                    th:text="${#temporals.format(expense.expenseDate, 'dd MMMM yyyy')}">Date</dd>

                                <dt class="col-sm-4 text-muted">
                                    <i class="bi bi-clock me-1"></i>Created
                                </dt>
                                <dd class="col-sm-8 text-muted small"
                                    th:text="${#temporals.format(expense.createdAt, 'dd MMM yyyy, HH:mm')}">Created</dd>

                                <dt class="col-sm-4 text-muted" th:if="${expense.updatedAt != expense.createdAt}">
                                    <i class="bi bi-clock-history me-1"></i>Updated
                                </dt>
                                <dd class="col-sm-8 text-muted small"
                                    th:if="${expense.updatedAt != expense.createdAt}"
                                    th:text="${#temporals.format(expense.updatedAt, 'dd MMM yyyy, HH:mm')}">Updated</dd>
                            </dl>
                        </div>
                        <div class="card-footer bg-transparent border-top">
                            <div class="d-flex justify-content-between">
                                <form th:action="@{/expenses/delete/{id}(id=${expense.id})}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this expense?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash me-1"></i>Delete
                                    </button>
                                </form>
                                <a th:href="@{/expenses/edit/{id}(id=${expense.id})}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-pencil me-1"></i>Edit Expense
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>

<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
